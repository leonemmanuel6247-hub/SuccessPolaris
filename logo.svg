<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dégradé pour le fond de l'icône -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.1" />
    </linearGradient>
    
    <!-- Filtre de lueur néon -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Filtre de lueur pour le texte -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond sombre pour présentation (optionnel, retirez-le pour un fond transparent) -->
  <rect width="800" height="300" fill="#020617" rx="20" />

  <!-- Conteneur de l'icône -->
  <g transform="translate(50, 75)">
    <!-- Carré arrondi d'arrière-plan -->
    <rect width="150" height="150" rx="45" fill="url(#iconGrad)" stroke="#22d3ee" stroke-width="2" stroke-opacity="0.4" />
    
    <!-- L'Atome Polaris -->
    <g transform="translate(75, 75)" filter="url(#neonGlow)">
      <!-- Noyau -->
      <circle cx="0" cy="0" r="10" fill="#22d3ee" />
      
      <!-- Électrons / Orbites -->
      <g stroke="#22d3ee" stroke-width="4" fill="none" opacity="0.8">
        <ellipse cx="0" cy="0" rx="55" ry="22" transform="rotate(0)" />
        <ellipse cx="0" cy="0" rx="55" ry="22" transform="rotate(60)" />
        <ellipse cx="0" cy="0" rx="55" ry="22" transform="rotate(120)" />
      </g>
    </g>
  </g>

  <!-- Texte SuccessPolaris -->
  <g transform="translate(230, 165)">
    <text font-family="Inter, sans-serif" font-weight="900" font-style="italic" font-size="72" letter-spacing="6" filter="url(#textGlow)">
      <tspan fill="#ffffff">SUCCESS</tspan><tspan fill="#22d3ee">POLARIS</tspan>
    </text>
    
    <!-- Slogan ou version -->
    <text y="40" x="5" font-family="Inter, sans-serif" font-weight="700" font-size="14" letter-spacing="10" fill="#22d3ee" opacity="0.4" text-transform="uppercase">
      Astral Palace Protocol // v1.0
    </text>
  </g>
</svg>
